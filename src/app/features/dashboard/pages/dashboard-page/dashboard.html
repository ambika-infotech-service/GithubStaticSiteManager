<section class="d-flex flex-column gap-4">
    <header>
        <h1 class="h2 mb-2">Dashboard</h1>
        <p class="text-secondary mb-0">Monitor your static sites deployed on GitHub Pages</p>
    </header>

    @if (isLoading()) {
    <div class="text-center py-5">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading apps...</span>
        </div>
    </div>
    } @else if (apps() && apps()!.length > 0) {
    <div class="row g-3">
        @for (item of apps(); track item.app.id) {
        <div class="col-12 col-md-6 col-lg-4">
            <app-app-card [item]="item" />
        </div>
        }
    </div>
    } @else {
    <div class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <p class="mb-3">No apps configured yet.</p>
            <p class="text-secondary mb-0">Add applications to the <code>apps.json</code> configuration file to get
                started.</p>
        </div>
    </div>
    }
</section>
